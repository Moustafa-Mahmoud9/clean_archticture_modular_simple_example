  pretty_dio_logger: ^1.3.1
  http_parser: ^4.0.2
  dartz: ^0.10.1
  equatable: ^2.0.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0