name: example_app_modular
description: Modular Flutter app composition root.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.8.0'

workspace:
  - packages/core
  - packages/ui
  - packages/core_implementation
  - packages/authentication/auth_domain
  - packages/authentication/auth_data
  - packages/authentication/auth_presentation

dependencies:
  flutter:
    sdk: flutter

  # Local packages — all layers wired here
  core:
    path: packages/core
  ui:
    path: packages/ui
  core_implementation:
    path: packages/core_implementation
  auth_domain:
    path: packages/authentication/auth_domain
  auth_data:
    path: packages/authentication/auth_data
  auth_presentation:
    path: packages/authentication/auth_presentation

  # App-level only — DI and cross-cutting things that compose features
  get_it: ^7.6.4
  flutter_bloc: ^9.1.1
  geolocator: ^14.0.2
  mobile_device_identifier: ^0.0.3
  package_info_plus: ^9.0.1
  bloc: ^9.2.0
  dio: ^5.4.0
  envied: ^1.3.4
  flutter_flavor: ^3.1.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  envied_generator: ^1.3.4
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0
  flutter_flavorizr: ^2.4.2
  melos: ^7.5.1

flutter:
  uses-material-design: true

melos:
  scripts:
    get:
      exec: flutter pub get
      description: Get dependencies for all packages

    analyze:
      exec: flutter analyze
      description: Analyze all packages

    test:
      exec: flutter test
      description: Test all packages

    clean:
      exec: melos clean
      description: Clean all packages

    generate:
      exec: dart run build_runner build --delete-conflicting-outputs
      description: Run code generation

    format:
      exec: dart format .
      description: Format all Dart files